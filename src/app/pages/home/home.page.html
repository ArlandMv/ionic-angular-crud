<ion-header>
  <ion-toolbar>
    <ion-title>Home</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h1>Featured Products</h1>

  <ion-list>
    <ion-item *ngFor="let product of products()">
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>
        <p>${{ product.price }}</p>
      </ion-label>
      <ion-button fill="clear" (click)="toggleFavorite(product.id)">
        <ion-icon
          [name]="product.favorite ? 'star' : 'star-outline'"
        ></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
