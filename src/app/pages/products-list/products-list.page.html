<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Products List</ion-title>
    <!--ion-buttons slot="end">
      <ion-button (click)="showAddForm = true">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-buttons-->
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" [fullscreen]="true">
  <!-- Product Form for Adding or Editing -->
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    <ion-item>
      <ion-label position="floating">Name</ion-label>
      <ion-input formControlName="name"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Description</ion-label>
      <ion-input formControlName="description"></ion-input>
    </ion-item>
    <ion-item>
      <ion-label position="floating">Price</ion-label>
      <ion-input type="number" formControlName="price"></ion-input>
    </ion-item>
    <ion-button expand="block" type="submit" [disabled]="productForm.invalid">
      {{ editingProduct ? 'Update Product' : 'Add Product' }}
    </ion-button>
  </form>

  <!-- Products List -->
  <ion-list>
    <!-- Access the signal's value by invoking it as a function -->
    <ion-item *ngFor="let product of products()">
      <ion-label>
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>
        <p>${{ product.price | number:'1.2-2' }}</p>
      </ion-label>
      <!-- Toggle Bought Status -->
      <ion-button fill="clear" (click)="toggleBought(product)">
        <ion-icon
          [name]="product.bought ? 'checkmark-circle' : 'ellipse-outline'"
        ></ion-icon>
      </ion-button>
      <!-- Toggle Favorite Status -->
      <ion-button fill="clear" (click)="toggleFavorite(product)">
        <ion-icon
          [name]="product.favorite ? 'star' : 'star-outline'"
        ></ion-icon>
      </ion-button>
      <!-- Edit Product -->
      <ion-button fill="clear" (click)="editProduct(product)">
        <ion-icon name="create"></ion-icon>
      </ion-button>
      <!-- Delete Product -->
      <ion-button fill="clear" (click)="deleteProduct(product.id)">
        <ion-icon name="trash"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
